<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>Jans webbsida</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Jans webbsida</h1>

<div class="box">
    <h2>Byt färg</h2>
    <button onclick="toggleMode()">Byt till mörkt läge</button>
</div>

<div class="box">
    <h2>Skriv kod</h2>
    <input type="text" id="inputText">
    <button onclick="checkCode()">Kör kod</button>
</div>

<script>
let dark = false;

function toggleMode() {
    if (dark == false) {
        document.body.style.backgroundColor = "black";
        dark = true;
    } else {
        document.body.style.backgroundColor = "#6b4cff";
        dark = false;
    }
}

function checkCode() {
    let text = document.getElementById("inputText").value;

    if (text == "nti gymnasiet") {
        document.body.style.backgroundColor = "blue";

    } else if (text == "banana") {
        document.body.style.backgroundColor = "#FFD84D";

    } else if (text == "tomato") {
        document.body.style.backgroundColor = "red";

    } else if (text == "apple") {
        document.body.style.backgroundColor = "green";
    }
}
</script>
</body>
</html>
